name: kanban-context
version: 2.2.3
description: "Injects recent Kanban board activity (task creation, moves, completions, blocks, worker heartbeats) into agent context via pre_llm_call hook. Gives agents awareness of work items flowing through all boards without requiring explicit board queries. Includes proactive install-time validation, auto-cleaning logs, cross-bot messaging with Telegram group visibility, and /kanban-status dashboard."
author: "Franklin Bravos (@franklinbravos)"
python: ">=3.11"
hooks:
  - pre_llm_call
